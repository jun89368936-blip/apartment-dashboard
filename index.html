<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 아파트 실거래가 대시보드</title>
    <!-- Tailwind CSS for professional, clean layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse for robust CSV processing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f3f4f6; }
        .table-container { max-height: 500px; overflow-y: auto; }
        thead th { position: sticky; top: 0; background-color: #f9fafb; z-index: 10; }
    </style>
</head>
<body class="text-gray-800 p-6">

    <div class="max-w-7xl mx-auto space-y-6">
        <!-- Header -->
        <header class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">우리 동네 아파트 실거래가 대시보드</h1>
                <p class="text-sm text-gray-500 mt-1">구글 시트 연동 기반 실시간 거래 데이터 분석</p>
            </div>
            <div class="flex items-center gap-4 w-full sm:w-auto">
                <!-- 법정동 필터 드롭다운 -->
                <select id="dongFilter" class="block w-full sm:w-56 pl-3 pr-8 py-2 text-base border-gray-300 bg-gray-50 text-gray-700 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md border shadow-sm transition-colors cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    <option value="전체">📍 법정동: 전체</option>
                </select>
                <div id="loadingIndicator" class="text-sm font-semibold text-blue-600 animate-pulse whitespace-nowrap">
                    데이터 로딩중...
                </div>
            </div>
        </header>

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-200">
                <h3 class="text-sm font-medium text-gray-500">전체 거래 건수</h3>
                <p class="text-3xl font-bold text-gray-900 mt-2" id="valTotalCount">-</p>
                <p class="text-xs text-gray-400 mt-1">건</p>
            </div>
            <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-200">
                <h3 class="text-sm font-medium text-gray-500">평균 거래가격</h3>
                <p class="text-3xl font-bold text-blue-600 mt-2" id="valAvgPrice">-</p>
                <p class="text-xs text-gray-400 mt-1">만원</p>
            </div>
            <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-200">
                <h3 class="text-sm font-medium text-gray-500">최고 거래가격</h3>
                <p class="text-3xl font-bold text-red-600 mt-2" id="valMaxPrice">-</p>
                <p class="text-xs text-gray-400 mt-1">만원</p>
            </div>
            <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-200">
                <h3 class="text-sm font-medium text-gray-500">최저 거래가격</h3>
                <p class="text-3xl font-bold text-green-600 mt-2" id="valMinPrice">-</p>
                <p class="text-xs text-gray-400 mt-1">만원</p>
            </div>
        </div>

        <!-- Chart Section -->
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
            <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">월별 평균 거래가격 추이</h2>
            <div class="relative h-80 w-full">
                <canvas id="monthlyPriceChart"></canvas>
            </div>
        </div>

        <!-- Table Section -->
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-6 border-b border-gray-200">
                <h2 class="text-lg font-bold text-gray-800">상세 거래 목록</h2>
            </div>
            <div class="table-container">
                <table class="min-w-full divide-y divide-gray-200 text-sm">
                    <thead>
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left font-semibold text-gray-600 uppercase tracking-wider">거래일자</th>
                            <th scope="col" class="px-6 py-3 text-left font-semibold text-gray-600 uppercase tracking-wider">법정동</th>
                            <th scope="col" class="px-6 py-3 text-left font-semibold text-gray-600 uppercase tracking-wider">아파트명</th>
                            <th scope="col" class="px-6 py-3 text-right font-semibold text-gray-600 uppercase tracking-wider">전용면적(㎡)</th>
                            <th scope="col" class="px-6 py-3 text-right font-semibold text-gray-600 uppercase tracking-wider">층</th>
                            <th scope="col" class="px-6 py-3 text-right font-semibold text-gray-600 uppercase tracking-wider">건축년도</th>
                            <th scope="col" class="px-6 py-3 text-right font-semibold text-blue-600 uppercase tracking-wider">거래금액(만원)</th>
                        </tr>
                    </thead>
                    <tbody id="transactionTableBody" class="bg-white divide-y divide-gray-200">
                        <!-- Data rows will be inserted here dynamically -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Data URL
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRlgvM64OxS1DOn7meUpxs6ryiWV8gXhNsSEZCS3vlrY6TTWAsfZDlvuv2v7dlhuVdxOTTc5CgQ7shj/pub?output=csv';

        // Global State
        let globalData = [];
        let uniqueDongs = new Set();
        let myChart = null;

        // Utility: Number formatting with commas
        const formatNumber = (num) => {
            return new Intl.NumberFormat('ko-KR').format(Math.round(num));
        };

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            fetchAndProcessData();
        });

        function fetchAndProcessData() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    // 유효한 데이터만 필터링하여 전역 변수에 저장
                    globalData = results.data.filter(row => row['거래일자'] && row['아파트명']);
                    
                    if(globalData.length > 0) {
                        const indicator = document.getElementById('loadingIndicator');
                        indicator.innerText = '데이터 로드 완료';
                        indicator.classList.remove('animate-pulse', 'text-blue-600');
                        indicator.classList.add('text-green-600');
                        
                        setTimeout(() => { indicator.style.display = 'none'; }, 2000);

                        // 법정동 고유 목록 추출
                        globalData.forEach(row => {
                            if (row['법정동'] && row['법정동'].trim() !== '') {
                                uniqueDongs.add(row['법정동'].trim());
                            }
                        });
                        
                        // 필터 초기화 및 전체 데이터 렌더링
                        initFilter();
                        processData(globalData);
                    } else {
                        showError('데이터를 찾을 수 없거나 형식 오류입니다.');
                    }
                },
                error: function(error) {
                    console.error("CSV Fetch Error:", error);
                    showError('데이터 통신 오류가 발생했습니다.');
                }
            });
        }

        function showError(message) {
            const indicator = document.getElementById('loadingIndicator');
            indicator.innerText = message;
            indicator.classList.replace('text-blue-600', 'text-red-600');
            indicator.classList.remove('animate-pulse');
        }

        // 법정동 필터 드롭다운 초기화 로직
        function initFilter() {
            const filterEl = document.getElementById('dongFilter');
            const sortedDongs = Array.from(uniqueDongs).sort();
            
            sortedDongs.forEach(dong => {
                const option = document.createElement('option');
                option.value = dong;
                option.textContent = dong;
                filterEl.appendChild(option);
            });
            
            filterEl.disabled = false; // 데이터 로드 완료 시 활성화
            
            // 변경 이벤트 리스너 등록
            filterEl.addEventListener('change', (e) => {
                const selectedDong = e.target.value;
                if (selectedDong === '전체') {
                    processData(globalData); // 전체 데이터 렌더링
                } else {
                    const filteredData = globalData.filter(row => row['법정동'] && row['법정동'].trim() === selectedDong);
                    processData(filteredData); // 필터링된 데이터 렌더링
                }
            });
        }

        function processData(data) {
            let totalCount = 0;
            let prices = [];
            let monthlyAggregates = {};

            const tableBody = document.getElementById('transactionTableBody');
            tableBody.innerHTML = ''; // 테이블 초기화

            data.forEach(row => {
                const priceStr = row['거래금액(만원)'] || '0';
                const price = parseInt(priceStr.toString().replace(/,/g, ''), 10);
                const dateStr = row['거래일자'] || '';
                
                // 월별 집계를 위한 키(YYYY-MM) 추출
                let monthKey = "알수없음";
                const dateMatch = dateStr.match(/(\d{4})[-.\/]?(\d{2})/);
                if (dateMatch) {
                    monthKey = `${dateMatch[1]}-${dateMatch[2]}`;
                }

                if (!isNaN(price) && price > 0) {
                    prices.push(price);
                    totalCount++;

                    if (!monthlyAggregates[monthKey]) {
                        monthlyAggregates[monthKey] = { sum: 0, count: 0 };
                    }
                    monthlyAggregates[monthKey].sum += price;
                    monthlyAggregates[monthKey].count++;
                }

                // 테이블 행 추가
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition-colors duration-150";
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-gray-500">${row['거래일자'] || '-'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-900">${row['법정동'] || '-'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-900 font-medium">${row['아파트명'] || '-'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-500 text-right">${row['전용면적(㎡)'] || '-'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-500 text-right">${row['층'] || '-'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-500 text-right">${row['건축년도'] || '-'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-blue-600 font-semibold text-right">${formatNumber(price)}</td>
                `;
                tableBody.appendChild(tr);
            });

            // 요약 카드 계산 및 업데이트
            if (prices.length > 0) {
                const maxPrice = Math.max(...prices);
                const minPrice = Math.min(...prices);
                const avgPrice = prices.reduce((a, b) => a + b, 0) / prices.length;

                document.getElementById('valTotalCount').innerText = formatNumber(totalCount);
                document.getElementById('valAvgPrice').innerText = formatNumber(avgPrice);
                document.getElementById('valMaxPrice').innerText = formatNumber(maxPrice);
                document.getElementById('valMinPrice').innerText = formatNumber(minPrice);
            } else {
                // 데이터가 없을 경우 처리
                document.getElementById('valTotalCount').innerText = '0';
                document.getElementById('valAvgPrice').innerText = '-';
                document.getElementById('valMaxPrice').innerText = '-';
                document.getElementById('valMinPrice').innerText = '-';
            }

            // 차트 데이터 준비 및 렌더링
            const sortedMonths = Object.keys(monthlyAggregates).sort();
            const chartLabels = sortedMonths;
            const chartData = sortedMonths.map(month => {
                return monthlyAggregates[month].sum / monthlyAggregates[month].count;
            });

            renderChart(chartLabels, chartData);
        }

        function renderChart(labels, data) {
            const ctx = document.getElementById('monthlyPriceChart').getContext('2d');
            
            if (myChart) {
                myChart.destroy();
            }

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '월별 평균 거래가격 (만원)',
                        data: data,
                        borderColor: 'rgb(37, 99, 235)',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: 'rgb(37, 99, 235)',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgb(37, 99, 235)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.parsed.y !== null) label += formatNumber(context.parsed.y) + ' 만원';
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            ticks: { callback: function(value) { return formatNumber(value); } },
                            grid: { color: 'rgba(0,0,0,0.05)' }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
